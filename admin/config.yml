backend:
  name: github
  repo: MiltonMaximus/Elite-CLS-Website
  branch: main
  base_url: https://auth.sveltia.app

# Where the live site lives. Used by the "View live" button in the CMS.
site_url: https://elite-cls.netlify.app
display_url: https://elite-cls.netlify.app

# Simple publish mode — saves push directly to main (matches our static-site deploy workflow).
publish_mode: simple

# No media uploads needed yet (jobs are text-only). When images are added later,
# point this at a folder under the repo root.
media_folder: ""
public_folder: ""

collections:
  - name: jobs
    label: "Vacancies"
    label_singular: "Vacancy"
    description: "Edit the Latest Jobs cards shown on the homepage and the full /jobs page."
    files:
      - name: jobs_list
        label: "All Vacancies"
        file: "data/jobs.json"
        format: "json"
        fields:
          - label: "Vacancies"
            name: jobs
            widget: list
            allow_add: true
            add_to_top: true
            summary: "{{fields.title}} — {{fields.location}}"
            fields:
              - label: "Job title"
                name: title
                widget: string
                hint: "Example: FLT Driver, Warehouse Operative, Bench Hand Worker."
              - label: "Location"
                name: location
                widget: string
                hint: "Example: London, Essex, Multiple Locations."
              - label: "Job type"
                name: type
                widget: string
                default: "Full-time / Temp"
                hint: "Example: Full-time / Temp, Part-time, Temporary, Contract."
              - label: "Status badge"
                name: status
                widget: select
                options:
                  - "Hiring Now"
                  - "Multiple Roles"
                  - "Urgent"
                  - "Closed"
                default: "Hiring Now"
                hint: "Pick the coloured badge shown on the card."
              - label: "Description"
                name: description
                widget: text
                hint: "Short summary, 1 or 2 sentences. Shown on the card."
              - label: "Date posted"
                name: date_posted
                widget: datetime
                format: "YYYY-MM-DD"
                date_format: "YYYY-MM-DD"
                time_format: false
                picker_utc: true
                hint: "Used to sort jobs. The 3 newest appear on the homepage."
